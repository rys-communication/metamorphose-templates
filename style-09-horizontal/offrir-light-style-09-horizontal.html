<style>:root{--noir:#0C0C0C;--blanc:#F7F5F0;--accent:#C8A96E;--accent2:#E8D5A8;--line:rgba(200,169,110,.2);--line-s:rgba(200,169,110,.08);--f-display:'Tenor Sans',Georgia,serif;--f-body:'Jost',sans-serif;--ease:cubic-bezier(.25,.46,.45,.94);}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:var(--f-body);font-weight:300;background:var(--noir);color:var(--blanc);overflow-x:hidden;cursor:none;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:60px 6%;}a{color:inherit;text-decoration:none;}

h1{font-family:var(--f-display);font-size:clamp(2.4rem,6vw,5rem);line-height:.9;color:var(--blanc);letter-spacing:-.02em;margin-bottom:24px;}
h1 em{font-style:italic;color:var(--accent2);}
.sub{font-size:.82rem;font-weight:300;color:rgba(247,245,240,.4);line-height:2.1;margin-bottom:40px;}
.bandes{display:flex;flex-direction:column;gap:0;}
.bande{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:16px 0;border-bottom:1px solid var(--line-s);}
.bande:first-child{border-top:1px solid var(--line-s);}
.bande-left{display:flex;flex-direction:column;gap:3px;}
.bande-nom{font-family:var(--f-display);font-size:1rem;color:var(--blanc);}
.bande-infos{display:flex;align-items:center;gap:12px;}
.bande-prix{font-family:var(--f-display);font-size:.9rem;color:var(--accent);}
.bande-sep{width:1px;height:12px;background:var(--line);}
.bande-duree{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(247,245,240,.2);}
.bande-btn{display:inline-block;background:transparent;color:var(--accent);font-family:var(--f-body);font-size:.54rem;font-weight:400;letter-spacing:.18em;text-transform:uppercase;padding:9px 18px;border:1px solid rgba(200,169,110,.25);transition:all .3s;white-space:nowrap;flex-shrink:0;}
.bande-btn:hover{background:var(--accent);color:var(--noir);}
.footer{margin-top:32px;padding-top:24px;border-top:1px solid var(--line-s);display:flex;gap:0;}
.btn-rdv{display:inline-block;background:var(--accent);color:var(--noir);font-family:var(--f-body);font-size:.6rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;padding:14px 32px;border:1px solid var(--accent);transition:all .3s;flex:1;text-align:center;}
.btn-rdv:hover{background:transparent;color:var(--accent);}
.btn-back{display:inline-block;background:transparent;color:rgba(247,245,240,.3);font-family:var(--f-body);font-size:.6rem;font-weight:300;letter-spacing:.18em;text-transform:uppercase;padding:14px 24px;border:1px solid rgba(247,245,240,.08);transition:all .3s;margin-left:-1px;}
.btn-back:hover{color:var(--blanc);border-color:rgba(247,245,240,.3);}
</style></head><body>

</body></html>
